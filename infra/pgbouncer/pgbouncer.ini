# ───────────────────────────────────────────────────────────────────────────────────────
# PgBouncer Configuration for Oto Muhasebe SaaS Platform
# ═══════════════════════════════════════════════════════════════
# Pool Mode: SESSION (MANDATORY for Prisma interactive transactions)
# Architecture: NestJS → PgBouncer → PostgreSQL
# ───────────────────────────────────────────────────────────────────────────────────────

[databases]
# Database connection configuration
# Format: dbname = host=hostname port=port
otomuhasebe = host=postgres port=5432 dbname=otomuhasebe_saas_db

[pgbouncer]
# ── CONNECTION POOL SETTINGS ───────────────────────────────────────────────────────
# Pool mode: SESSION is MANDATORY for Prisma $transaction()
# DO NOT use 'transaction' or 'statement' modes!
pool_mode = session

# Maximum client connections (total across all pools)
# Backend has 3 instances × ~20 connections each = ~60 connections
# Set higher to handle burst traffic
max_client_conn = 200

# Default pool size per database
# Each backend instance will maintain ~20 connections to PostgreSQL
default_pool_size = 20

# Minimum pool size (keeps connections warm)
min_pool_size = 5

# Reserve pool for connection bursts
reserve_pool_size = 10

# Timeout for reserve pool connections
reserve_pool_timeout = 5

# ── SERVER CONNECTION SETTINGS ────────────────────────────────────────────────────
# Idle server connections timeout (in seconds)
# 600 seconds = 10 minutes
server_idle_timeout = 600

# Client idle timeout (0 = no timeout)
# Clients can keep connections open indefinitely
client_idle_timeout = 0

# ── AUTHENTICATION SETTINGS ─────────────────────────────────────────────────────
# Authentication type: MD5 (passwords in userlist.txt are MD5 hashed)
auth_type = md5

# Authentication file location (mapped from ./pgbouncer/userlist.txt)
auth_file = /etc/pgbouncer/userlist.txt

# Admin users (comma-separated list)
# These users can access PgBouncer admin console
admin_users = postgres

# ── LISTEN SETTINGS ───────────────────────────────────────────────────────────
# Listen address (0.0.0.0 = all interfaces)
listen_addr = *

# Listen port (PostgreSQL default)
# Backend connects to PgBouncer on this port
listen_port = 5432

# ── SERVER RESET SETTINGS ─────────────────────────────────────────────────────
# Query to run when a connection is returned to the pool
# DISCARD ALL resets session state (temp tables, prepared statements, etc.)
server_reset_query = DISCARD ALL

# Ignore startup parameters that PgBouncer shouldn't cache
# extra_float_digits: PostgreSQL may send different values for precision
ignore_startup_parameters = extra_float_digits

# ── LOGGING SETTINGS ───────────────────────────────────────────────────────
# Log file location (mounted volume: pgbouncer_logs)
logfile = /var/log/pgbouncer/pgbouncer.log

# PID file location
pidfile = /var/run/pgbouncer/pgbouncer.pid

# Log verbosity: 1 = minimal, 5 = maximum
# 1 is recommended for production (errors only)
# 3-5 for debugging (not recommended in production)
log_pooler_errors = 1
log_connections = 1
log_disconnections = 1
log_stats = 1

# ── QUERY TIMEOUTS ─────────────────────────────────────────────────────────
# Query timeout (in seconds)
# 0 = no timeout (recommended for long-running queries)
query_timeout = 0

# Query wait timeout (in seconds)
# 120 seconds = 2 minutes
query_wait_timeout = 120

# ── ADVANCED SETTINGS ───────────────────────────────────────────────────────
# Client login timeout (in seconds)
client_login_timeout = 60

# Server lifetime (in seconds)
# 3600 seconds = 1 hour
server_lifetime = 3600

# Server connect timeout (in seconds)
server_connect_timeout = 15

# ───────────────────────────────────────────────────────────────────────────────────────
# NOTES:
#
# 1. SESSION MODE IS MANDATORY for Prisma $transaction()
#    - transaction mode: breaks Prisma interactive transactions
#    - statement mode: breaks Prisma interactive transactions
#    - session mode: CORRECT for Prisma
#
# 2. DATABASE_URL must include:
#    ?pgbouncer=true&connection_limit=1
#
# 3. DIRECT_DATABASE_URL must point to PostgreSQL directly
#    - Required for prisma migrate deploy
#    - Migrations CANNOT run through PgBouncer
#
# 4. Passwords in userlist.txt MUST be MD5 hashed:
#    echo -n "passwordUSERNAME" | md5sum
#    Format: "username" "md5hash"
#
# 5. Plain text passwords in userlist.txt will be SILENTLY REJECTED
#    - PgBouncer will NOT show any error message
#    - All connections will fail with "authentication failed"
#    - Check /var/log/pgbouncer/pgbouncer.log for details
# ───────────────────────────────────────────────────────────────────────────────────────