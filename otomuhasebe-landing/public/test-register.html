<form id="registerForm" method="POST" action="https://api.otomuhasebe.com/api/auth/register">
  <input type="email" name="email" placeholder="Email" required><br>
  <input type="password" name="password" placeholder="Password" required><br>
  <input type="text" name="username" placeholder="Username" required><br>
  <input type="text" name="fullName" placeholder="Full Name" required><br>
  <input type="text" name="firstName" placeholder="First Name" required><br>
  <input type="text" name="lastName" placeholder="Last Name" required><br>
  <input type="tel" name="phone" placeholder="Phone" required><br>
  <select name="companyType" required>
    <option value="LIMITED">Limited Company</option>
    <option value="SOLE">Sole Proprietorship</option>
  </select><br>
  <button type="submit">Register</button>
</form>
<div id="result"></div>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  
  try {
    const response = await fetch("https://api.otomuhasebe.com/api/auth/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });
    const result = await response.json();
    document.getElementById("result").innerHTML = "<pre>" + JSON.stringify(result, null, 2) + "</pre>";
  } catch (error) {
    document.getElementById("result").innerHTML = "<pre>Error: " + error.message + "</pre>";
  }
});
</script>
