<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Stars/Particles -->
  <circle cx="100" cy="80" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="200" cy="150" r="1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="350" cy="60" r="1.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="500" cy="120" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="650" cy="40" r="1.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="800" cy="90" r="1" fill="rgba(255,255,255,0.25)"/>
  <circle cx="950" cy="70" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1100" cy="130" r="1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="150" cy="200" r="1" fill="rgba(255,255,255,0.15)"/>
  <circle cx="400" cy="180" r="1.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="700" cy="160" r="1" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1000" cy="200" r="1.5" fill="rgba(255,255,255,0.2)"/>

  <!-- Sun/Moon -->
  <circle cx="1050" cy="120" r="60" fill="url(#sunGrad)" opacity="0.9"/>
  <circle cx="1050" cy="120" r="50" fill="none" stroke="#FCD34D" stroke-width="2" opacity="0.3"/>

  <!-- Mountains Background -->
  <path d="M0 500 L150 350 L300 450 L450 300 L600 420 L750 280 L900 400 L1050 320 L1200 450 L1200 800 L0 800 Z" fill="#1E3A5F" opacity="0.4"/>
  <path d="M0 600 L200 450 L400 550 L550 400 L700 520 L850 380 L1000 500 L1200 420 L1200 800 L0 800 Z" fill="#1E3A5F" opacity="0.3"/>

  <!-- Field/Ground -->
  <path d="M0 650 Q300 600 600 640 Q900 680 1200 620 L1200 800 L0 800 Z" fill="#059669" opacity="0.2"/>
  <path d="M0 700 Q400 660 800 700 Q1100 730 1200 690 L1200 800 L0 800 Z" fill="#10B981" opacity="0.15"/>

  <!-- Wheat/Grain stalks -->
  <g opacity="0.5" fill="#FCD34D">
    <path d="M80 650 Q85 600 80 550 Q75 600 80 650"/>
    <ellipse cx="80" cy="545" rx="4" ry="10"/>
    <path d="M90 655 Q95 610 90 565 Q85 610 90 655"/>
    <ellipse cx="90" cy="560" rx="4" ry="10"/>
    <path d="M100 648 Q105 595 100 540 Q95 595 100 648"/>
    <ellipse cx="100" cy="535" rx="4" ry="10"/>

    <path d="M1080 640 Q1085 590 1080 540 Q1075 590 1080 640"/>
    <ellipse cx="1080" cy="535" rx="4" ry="10"/>
    <path d="M1090 645 Q1095 595 1090 545 Q1085 595 1090 645"/>
    <ellipse cx="1090" cy="540" rx="4" ry="10"/>
    <path d="M1100 642 Q1105 585 1100 530 Q1095 585 1100 642"/>
    <ellipse cx="1100" cy="525" rx="4" ry="10"/>
  </g>

  <!-- Tractor Icon -->
  <g transform="translate(500, 580)" opacity="0.15">
    <rect x="0" y="20" width="60" height="25" rx="3" fill="#fff"/>
    <rect x="55" y="25" width="25" height="20" rx="2" fill="#fff"/>
    <circle cx="20" cy="50" r="15" fill="none" stroke="#fff" stroke-width="3"/>
    <circle cx="70" cy="50" r="12" fill="none" stroke="#fff" stroke-width="3"/>
    <rect x="10" y="15" width="8" height="10" fill="#fff"/>
  </g>

  <!-- Grain Silo -->
  <g transform="translate(180, 520)" opacity="0.2">
    <rect x="0" y="30" width="50" height="80" fill="#fff"/>
    <path d="M-5 30 L25 0 L55 30 Z" fill="#fff"/>
    <rect x="15" y="50" width="20" height="25" fill="#0F172A"/>
  </g>

  <!-- Warehouse -->
  <g transform="translate(900, 530)" opacity="0.2">
    <rect x="0" y="30" width="80" height="60" fill="#fff"/>
    <path d="M-5 30 L40 5 L85 30 Z" fill="#fff"/>
    <rect x="10" y="45" width="15" height="20" fill="#0F172A"/>
    <rect x="35" y="45" width="15" height="20" fill="#0F172A"/>
    <rect x="60" y="45" width="15" height="20" fill="#0F172A"/>
  </g>

  <!-- Truck -->
  <g transform="translate(700, 620)" opacity="0.12">
    <rect x="0" y="10" width="70" height="30" rx="2" fill="#fff"/>
    <rect x="65" y="15" width="30" height="25" rx="2" fill="#fff"/>
    <circle cx="20" cy="45" r="10" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="50" cy="45" r="10" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="85" cy="45" r="8" fill="none" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Road -->
  <path d="M0 680 Q600 660 1200 690" stroke="#334155" stroke-width="8" fill="none" opacity="0.4"/>
  <path d="M0 680 Q600 660 1200 690" stroke="#fff" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="20,30"/>

  <!-- Accent Glow -->
  <ellipse cx="200" cy="400" rx="300" ry="200" fill="url(#accentGrad)" opacity="0.5"/>
  <ellipse cx="900" cy="300" rx="250" ry="180" fill="url(#accentGrad)" opacity="0.3"/>

  <!-- Scale/Balance icon hint -->
  <g transform="translate(550, 280)" opacity="0.08">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#fff" stroke-width="2"/>
    <line x1="50" y1="0" x2="50" y2="40" stroke="#fff" stroke-width="2"/>
    <circle cx="10" cy="0" r="8" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="90" cy="0" r="8" fill="none" stroke="#fff" stroke-width="2"/>
  </g>
</svg>