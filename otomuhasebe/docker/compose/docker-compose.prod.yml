version: "3.9"

services:
  backend:
    image: ${IMAGE_REGISTRY}/${API_IMAGE_NAME}:${IMAGE_TAG}
    env_file:
      - .env.production
    environment:
      <<: *common_env
      PORT: 3000
      API_HEALTH_PATH: /health
    depends_on:
      - postgres
    networks: [app_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  admin-panel:
    image: ${IMAGE_REGISTRY}/${ADMIN_IMAGE_NAME}:${IMAGE_TAG}
    env_file:
      - .env.production
    environment:
      <<: *common_env
      PORT: 3000
      UI_HEALTH_PATH: /
    networks: [app_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  landing-page:
    image: ${IMAGE_REGISTRY}/${LANDING_IMAGE_NAME}:${IMAGE_TAG}
    env_file:
      - .env.production
    environment:
      <<: *common_env
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: https://api.otomuhasebe.com
    networks: [app_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
