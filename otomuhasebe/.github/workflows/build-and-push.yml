name: Build and Push Images

on:
  push:
    tags:
      - "v1.0.*"

env:
  REGISTRY: ${{ vars.IMAGE_REGISTRY }}  # Settings → Variables → IMAGE_REGISTRY=ghcr.io/your-org
  API_IMAGE_NAME: ${{ vars.API_IMAGE_NAME }}
  ADMIN_IMAGE_NAME: ${{ vars.ADMIN_IMAGE_NAME }}
  LANDING_IMAGE_NAME: ${{ vars.LANDING_IMAGE_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker QEMU
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Extract tag (vX.Y.Z → X.Y.Z)
        id: tag
        run: echo "TAG=\${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api-stage/server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/my-saas-api:\${{ steps.tag.outputs.TAG }}

      - name: Build & Push Admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: admin-stage/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/my-saas-admin:\${{ steps.tag.outputs.TAG }}

      - name: Build & Push Landing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: otomuhasebe-landing/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/my-saas-landing:\${{ steps.tag.outputs.TAG }}
