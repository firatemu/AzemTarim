name: PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  backend-checks:
    name: Backend Checks (Lint + Type)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: api-stage/server/package-lock.json

      - name: Install dependencies
        working-directory: api-stage/server
        run: npm ci

      - name: ESLint check
        working-directory: api-stage/server
        run: npm run lint

      - name: TypeScript check
        working-directory: api-stage/server
        run: npx tsc --noEmit

  frontend-checks:
    name: Frontend Checks (Lint + Type + Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: panel-stage/client
        run: pnpm install --frozen-lockfile

      - name: ESLint check
        working-directory: panel-stage/client
        run: pnpm lint

      - name: TypeScript check
        working-directory: panel-stage/client
        run: pnpm tsc --noEmit

      - name: Next.js build check
        working-directory: panel-stage/client
        run: pnpm build
